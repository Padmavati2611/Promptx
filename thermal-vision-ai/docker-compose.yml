version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: thermal-vision-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thermal_vision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thermal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermal-vision-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/thermal_vision
      SECRET_KEY: your-super-secret-key-change-in-production
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - thermal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thermal-vision-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - thermal-network

volumes:
  postgres_data:

networks:
  thermal-network:
    driver: bridge
